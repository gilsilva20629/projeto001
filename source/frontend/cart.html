<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Cart</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <a href="shopping.html" target="_self">Shopping</a>
        <button type="button" name="order" id="close">Close order</button>
        <br><br>
        <table>
            <tr>
                <td>Descrição</td>
                <td>Valor R$</td>
            </tr>
        </table>
                       
        <script>
            //allItems = new Map();
            const items = [];
            let total = 0;

            for(let i=0; i < sessionStorage.length; i++){
                const key = sessionStorage.key(i);
                const value = sessionStorage.getItem(key);
                //allItems[key] = JSON.parse(value);
                items.push(JSON.parse(value));

            };
            
            items.forEach((value) => {
                const tr = window.document.createElement("tr"); 
                const td01 = window.document.createElement("td");
                const td02 = window.document.createElement("td");
                td01.innerHTML = value[0];
                td02.innerHTML = parseFloat(value[1].slice(3));
                total = parseFloat(value[1].slice(3)) + total;
                tr.appendChild(td01);
                tr.appendChild(td02);
                window.document.getElementsByTagName("tbody")[0].appendChild(tr);
            });
            const br = window.document.createElement("br");
            const small = window.document.createElement("small");
            small.innerText = `Total: R$ ${total}`;
            window.document.body.appendChild(br);
            window.document.body.appendChild(small);
             
        </script>
        
    </body>
</html>

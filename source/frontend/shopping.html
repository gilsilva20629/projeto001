<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Cart</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <a href="shopping.html" target="_self">Shopping</a>
        <button type="button" name="previous" id="previous" onclick="previousPage()">Previous</button>
        <label id="label"></label>
        <button type="button" name="next" id="next" onclick="nextPage(window.products)">Next</button>
        <button type="button" name="order" id="close">Close order</button>
        <br>
        <br>

        <script type="module">
            import { carregarProdutos, addCart } from "./js/funcoesGerais.js";
            import {
                pages, currentPage, createMain, createStdDiv, appendToBody, removeFromBody, appendMain,
                nextPage, previousPage, StdDivFill, incrementCurrentPage, decrementCurrentPage
            } from "./js/templates.js";

            window.addCart = addCart;   // Torna a função acessível globalmente.
            window.nextPage = nextPage; // Torna a função acessível globalmente.
            window.previousPage = previousPage;
            window.products = await carregarProdutos();
            const main = createMain();
            appendToBody((main));
            //mainFill();
            const divs = StdDivFill(window.products);
            divs.forEach( (element) => {
                appendMain(element);
            });
            pages.push(main);
            //incrementCurrentPage();
            window.document.getElementById("label").innerHTML = currentPage;
            window.document.getElementsByName('previous')[0].disabled = true;
        </script>
        
    </body>
</html>
